name: API Tests & Governance
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install json-server
        run: npm install -g json-server
      - name: Start mock server
        run: |
          json-server --watch db.json --port 3000 &
          sleep 3
      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman
        run: postman login --with-api-key $POSTMAN_API_KEY
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      - name: Run Collection Tests
        run: postman collection run 52274286-f1b23f60-097b-43c5-beec-770898f01818 --env-var "baseUrl=http://localhost:3000"

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Lint OpenAPI Spec
        run: spectral lint openapi.yaml --fail-severity error