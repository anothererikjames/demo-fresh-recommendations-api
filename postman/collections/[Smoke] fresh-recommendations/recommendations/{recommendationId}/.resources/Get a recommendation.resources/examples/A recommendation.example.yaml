$kind: http-example
id: f7bc85f7-3d13-42eb-9904-925bbd486d1f
request:
  url: "{{baseUrl}}/recommendations/:recommendationId"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: recommendationId
      value: rec-101
      description: Unique recommendation identifier
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "recommendationId": "rec-101",
        "status": "active",
        "customerId": "cus-101",
        "itemIds": [
          "sku-101",
          "sku-102"
        ],
        "strategy": "personalized",
        "createdAt": "2026-07-16T20:00:00Z",
        "updatedAt": "2026-07-16T20:00:00Z",
        "confidence": 0.92
      }
order: 1000
