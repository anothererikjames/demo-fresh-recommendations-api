openapi: 3.0.3
info:
  title: Fresh Commerce Recommendations API
  version: 1.0.0
  description: Production-shaped demo service for the Fresh Commerce API Catalog. Manages recommendations with typed contracts,
    pagination, health checks, and consistent errors.
  contact:
    name: Fresh Commerce Platform Team
    email: platform@example.com
  license:
    name: MIT
    url: https://opensource.org/license/mit
servers:
- url: https://recommendations.api.fresh-commerce.test
  description: Catalog runtime placeholder
security:
- bearerAuth: []
tags:
- name: Recommendation
  description: Manage recommendations
- name: Operations
  description: Service health
paths:
  /health:
    get:
      tags:
      - Operations
      summary: Check service health
      operationId: getRecommendationServiceHealth
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '429':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /recommendations:
    get:
      tags:
      - Recommendation
      summary: List recommendations
      operationId: listRecommendations
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - active
          - served
          - converted
          - expired
      responses:
        '200':
          description: Page of recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
      - Recommendation
      summary: Create a recommendation
      operationId: createRecommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationCreate'
      responses:
        '201':
          description: A recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recommendation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /recommendations/{recommendationId}:
    parameters:
    - $ref: '#/components/parameters/RecommendationId'
    get:
      tags:
      - Recommendation
      summary: Get a recommendation
      operationId: getRecommendation
      responses:
        '200':
          description: A recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recommendation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
      - Recommendation
      summary: Update a recommendation
      operationId: updateRecommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationUpdate'
      responses:
        '200':
          description: A recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recommendation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
      - Recommendation
      summary: Delete a recommendation
      operationId: deleteRecommendation
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RecommendationId:
      name: recommendationId
      in: path
      required: true
      description: Unique recommendation identifier
      schema:
        type: string
        minLength: 1
      example: rec-101
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Recommendation:
      type: object
      required:
      - recommendationId
      - status
      - customerId
      - itemIds
      - strategy
      - createdAt
      - updatedAt
      properties:
        recommendationId:
          type: string
          example: rec-101
        status:
          type: string
          enum:
          - active
          - served
          - converted
          - expired
          example: active
        customerId:
          type: string
          example: cus-101
        itemIds:
          type: array
          minItems: 1
          items:
            type: string
          example:
          - sku-101
          - sku-102
        strategy:
          type: string
          enum:
          - personalized
          - trending
          - frequently_bought
          example: personalized
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.92
        createdAt:
          type: string
          format: date-time
          example: '2026-07-16T20:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-07-16T20:00:00Z'
      additionalProperties: false
    RecommendationCreate:
      type: object
      required:
      - customerId
      - itemIds
      - strategy
      properties:
        status:
          type: string
          enum:
          - active
          - served
          - converted
          - expired
          example: active
        customerId:
          type: string
          example: cus-101
        itemIds:
          type: array
          minItems: 1
          items:
            type: string
          example:
          - sku-101
          - sku-102
        strategy:
          type: string
          enum:
          - personalized
          - trending
          - frequently_bought
          example: personalized
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.92
      additionalProperties: false
    RecommendationUpdate:
      type: object
      minProperties: 1
      properties:
        status:
          type: string
          enum:
          - active
          - served
          - converted
          - expired
          example: active
        customerId:
          type: string
          example: cus-101
        itemIds:
          type: array
          minItems: 1
          items:
            type: string
          example:
          - sku-101
          - sku-102
        strategy:
          type: string
          enum:
          - personalized
          - trending
          - frequently_bought
          example: personalized
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.92
      additionalProperties: false
    RecommendationList:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Recommendation'
        meta:
          $ref: '#/components/schemas/PageMeta'
      additionalProperties: false
    PageMeta:
      type: object
      required:
      - limit
      - count
      properties:
        limit:
          type: integer
          example: 20
        count:
          type: integer
          example: 1
        nextCursor:
          type: string
          nullable: true
          example: null
      additionalProperties: false
    Health:
      type: object
      required:
      - status
      - service
      - version
      properties:
        status:
          type: string
          enum:
          - ok
          example: ok
        service:
          type: string
          example: recommendations
        version:
          type: string
          example: 1.0.0
      additionalProperties: false
    Error:
      type: object
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
          example: The requested resource was not found
        requestId:
          type: string
          example: req-9f2a
      additionalProperties: false
